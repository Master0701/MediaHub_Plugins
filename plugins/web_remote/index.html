<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MediaHub Control Center</title><style>
:root{--bg:#14161a;--panel:#1d2026;--panel2:#242830;--line:#363b45;--text:#f4f5f7;--muted:#aeb4bf;--accent:#f0c419;--ok:#4ecb71;--warn:#efb94f;--danger:#e86666;--r:14px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 Segoe UI,Arial}.app{display:grid;grid-template-columns:255px 1fr;min-height:100vh}.side{height:100vh;position:sticky;top:0;background:#101216;border-right:1px solid var(--line);padding:20px 14px;overflow:auto}.brand{padding:8px 10px 20px;font-size:18px;font-weight:800}.brand small{display:block;color:var(--muted);font-weight:400}.nav{display:grid;gap:5px}.nav button{border:0;background:transparent;color:var(--muted);padding:10px 12px;text-align:left;border-radius:10px;cursor:pointer}.nav button.active,.nav button:hover{background:var(--panel2);color:var(--text)}.main{min-width:0}.top{position:sticky;top:0;z-index:5;background:rgba(20,22,26,.95);border-bottom:1px solid var(--line);padding:18px 26px;display:flex;justify-content:space-between}.content{padding:26px;max-width:1500px;margin:auto}.page{display:none}.page.active{display:block}.hero{display:flex;justify-content:space-between;align-items:end;gap:15px;margin-bottom:18px}.hero h2{margin:0}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}.number{font-size:34px;color:var(--accent);font-weight:800}.button,input,select{font:inherit;border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--text);padding:9px 12px}.button{cursor:pointer}.toolbar{display:flex;gap:10px;margin-bottom:14px}.actionbar{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 18px}.actionbar .button{display:inline-flex;align-items:center;gap:7px}.actionbar .primary{background:var(--accent);color:#161616;border-color:var(--accent);font-weight:700}.toolbar input{flex:1}.list{display:grid;gap:9px}.row{display:grid;grid-template-columns:minmax(180px,2fr) repeat(3,minmax(90px,1fr));gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}.badge{font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid var(--line)}.ok{color:var(--ok)}.warn{color:var(--warn)}.off{color:var(--muted)}.progress{height:10px;background:#101216;border-radius:99px;overflow:hidden}.progress>i{display:block;height:100%;background:var(--accent)}.empty{text-align:center;color:var(--muted);padding:30px}.mobile{display:none}@media(max-width:1050px){.app{grid-template-columns:84px 1fr}.brand small,.nav span{display:none}.nav button{text-align:center;font-size:20px}.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.app{display:block}.side{display:none}.content{padding:16px 12px 82px}.top{padding:14px}.grid{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr}.mobile{display:flex;position:fixed;bottom:0;left:0;right:0;background:#101216;border-top:1px solid var(--line);z-index:20;overflow:auto}.mobile button{min-width:72px;flex:1;border:0;background:transparent;color:var(--muted);padding:10px 5px}.mobile button.active{color:var(--accent)}}
.wizard-steps{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.wizard-step{padding:8px 11px;border:1px solid var(--line);border-radius:999px;color:var(--muted)}.wizard-step.active{background:var(--accent);color:#161616;border-color:var(--accent);font-weight:700}.wizard-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.wizard-grid label{display:grid;gap:6px;color:var(--muted)}.wizard-grid input,.wizard-grid select{width:100%}.wizard-actions{display:flex;justify-content:space-between;gap:10px;margin-top:16px}.check{display:flex!important;grid-template-columns:auto 1fr!important;align-items:center;gap:8px!important}.check input{width:auto}.playlist-edit{grid-template-columns:40px minmax(180px,2fr) minmax(130px,1fr) 90px!important}.loading-box{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--accent);border-radius:12px;background:#2a2615}.spinner{width:22px;height:22px;border:3px solid #665b21;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.channel-preview{display:grid;grid-template-columns:110px 1fr;gap:16px;align-items:center}.channel-preview img{width:110px;height:110px;object-fit:cover;border-radius:14px;border:1px solid var(--line)}.video-select{grid-template-columns:42px 96px minmax(220px,2fr) minmax(140px,1fr) 100px!important}.video-select img{width:88px;height:50px;object-fit:cover;border-radius:8px;background:#111}.video-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}@media(max-width:700px){.channel-preview{grid-template-columns:1fr}.video-select{grid-template-columns:40px 80px 1fr!important}.video-select span:nth-last-child(-n+2){display:none}}@media(max-width:700px){.wizard-grid{grid-template-columns:1fr}}
.pairing-overlay{position:fixed;inset:0;background:rgba(8,10,13,.94);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}.pairing-overlay.show{display:flex}.pairing-box{width:min(480px,100%);background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px}.pairing-code{font-size:28px;letter-spacing:8px;text-align:center}.pairing-box input{width:100%;margin:8px 0}.pairing-error{color:var(--danger);min-height:22px}</style></head><body><div class="app"><aside class="side"><div class="brand">🟡 MediaHub<small>Control Center · lokal</small></div><nav class="nav" id="nav"></nav></aside><main class="main"><header class="top"><strong id="title">Dashboard</strong><span id="connection" class="badge warn">Verbinde …</span></header><div class="content" id="pages"></div></main></div><nav class="mobile" id="mobile"></nav><div class="pairing-overlay" id="pairing-overlay"><div class="pairing-box"><h2>🔒 Gerät koppeln</h2><p class="muted">Dieses Gerät benötigt den Einmalcode aus den WebRemote-Einstellungen im MediaHub Plugin-Center.</p><input id="pairing-device" placeholder="Gerätename"><input id="pairing-code" class="pairing-code" inputmode="numeric" maxlength="6" placeholder="6-stelliger Code"><div class="pairing-error" id="pairing-error"></div><button class="button primary" onclick="claimPairing()">Gerät koppeln</button></div></div><script>
const sections=[['dashboard','🏠','Dashboard'],['assistant','🧙','Assistent'],['channels','📺','Kanäle'],['playlists','📂','Playlists'],['library','🎬','Bibliothek'],['downloads','⬇️','Downloads'],['jobs','📋','Jobs'],['scheduler','⏰','Scheduler'],['statistics','📊','Statistik'],['plugins','🧩','Plugins'],['system','🖥️','System'],['activities','📜','Aktivitäten']];
const pages=document.getElementById('pages'),nav=document.getElementById('nav'),mobile=document.getElementById('mobile');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
sections.forEach(([id,ico,label],i)=>{nav.insertAdjacentHTML('beforeend',`<button data-page="${id}" class="${i?'':'active'}">${ico} <span>${label}</span></button>`);mobile.insertAdjacentHTML('beforeend',`<button data-page="${id}" class="${i?'':'active'}">${ico}<small>${label}</small></button>`);pages.insertAdjacentHTML('beforeend',`<section class="page ${i?'':'active'}" id="page-${id}"><div class="empty">${label} wird geladen …</div></section>`)});
function show(id){if(!authReady)return;document.querySelectorAll('.page').forEach(x=>x.classList.toggle('active',x.id==='page-'+id));document.querySelectorAll('[data-page]').forEach(x=>x.classList.toggle('active',x.dataset.page===id));title.textContent=sections.find(x=>x[0]===id)?.[2]||id;load(id)}document.addEventListener('click',e=>{const b=e.target.closest('[data-page]');if(b)show(b.dataset.page)});
const tokenKey='mediahub_web_token';
let sessionToken='';
try{sessionToken=localStorage.getItem(tokenKey)||''}catch(e){sessionToken=''}
let authCheckPromise=null;
let pairingVisible=false;
let pairingCompleting=false;
let authReady=false;
let authGeneration=0;
function authHeaders(extra={}){return {...extra,...(sessionToken?{'Authorization':'Bearer '+sessionToken}:{})}}
async function confirmAuthorization(){
  if(authCheckPromise)return authCheckPromise;
  const token=sessionToken;
  authCheckPromise=(async()=>{
    if(!token)return false;
    try{
      const r=await fetch('/api/pairing/status',{headers:{'Authorization':'Bearer '+token,'Accept':'application/json'},cache:'no-store'});
      const d=await r.json().catch(()=>({}));
      return !!(r.ok&&d.authorized);
    }catch(e){return null}
  })();
  try{return await authCheckPromise}finally{authCheckPromise=null}
}
async function requestJson(path,options={},retried=false){
  const generation=authGeneration;
  options={...options,headers:authHeaders(options.headers||{})};
  if(options.method!=='POST')options.cache='no-store';
  const r=await fetch(path,options);
  const d=await r.json().catch(()=>({}));
  if(r.status===401){
    if(generation!==authGeneration)throw new Error('Veraltete Anfrage verworfen.');
    const stillAuthorized=await confirmAuthorization();
    if(stillAuthorized===true&&!retried){
      await new Promise(resolve=>setTimeout(resolve,120));
      return requestJson(path,options,true);
    }
    if(stillAuthorized===false&&authReady&&!pairingCompleting){authReady=false;showPairing()}
    throw new Error(stillAuthorized===null?'Verbindung zu MediaHub unterbrochen.':(d.message||'Gerät muss gekoppelt werden.'));
  }
  if(!r.ok)throw new Error(d.message||d.error||'Anfrage fehlgeschlagen');
  return d
}
async function api(path){return requestJson(path)}
function showPairing(){
  const overlay=document.getElementById('pairing-overlay');
  const device=document.getElementById('pairing-device');
  if(!pairingVisible){
    if(!device.value.trim())device.value=localStorage.getItem('mediahub_web_device_name')||navigator.platform||'Mein Gerät';
    overlay.classList.add('show');
    pairingVisible=true;
    setTimeout(()=>device.focus(),0);
  }
}
function hidePairing(){document.getElementById('pairing-overlay').classList.remove('show');pairingVisible=false}
async function claimPairing(){
  const code=document.getElementById('pairing-code').value.trim();
  const device_name=document.getElementById('pairing-device').value.trim()||'Mein Gerät';
  const error=document.getElementById('pairing-error');
  const button=document.querySelector('#pairing-overlay .button.primary');
  error.textContent='';
  if(code.length!==6){error.textContent='Bitte den sechsstelligen Einmalcode eingeben.';return}
  pairingCompleting=true;
  button.disabled=true;
  button.textContent='Gerät wird gekoppelt …';
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),12000);
  try{
    const response=await fetch('/api/pairing/claim',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({code,device_name}),
      cache:'no-store',
      signal:controller.signal
    });
    const d=await response.json().catch(()=>({}));
    if(!response.ok||!d.token)throw new Error(d.message||d.error||'Kopplung fehlgeschlagen.');
    sessionToken=d.token;
    try{localStorage.setItem(tokenKey,d.token);localStorage.setItem('mediahub_web_device_name',device_name)}catch(e){}
    const check=await fetch('/api/pairing/status',{
      headers:{'Authorization':'Bearer '+d.token,'Accept':'application/json'},
      cache:'no-store',
      signal:controller.signal
    });
    const status=await check.json().catch(()=>({}));
    if(!check.ok||!status.authorized)throw new Error('Das Gerät wurde gespeichert, aber die Anmeldung konnte nicht bestätigt werden.');
    clearTimeout(timeout);
    document.getElementById('pairing-code').value='';
    error.style.color='var(--ok)';
    error.textContent='Gerät gekoppelt. Dashboard wird geöffnet …';
    authGeneration++;
    authReady=true;
    hidePairing();
    pairingCompleting=false;
    button.disabled=false;
    button.textContent='Gerät koppeln';
    show('dashboard');
  }catch(e){
    clearTimeout(timeout);
    pairingCompleting=false;
    button.disabled=false;
    button.textContent='Gerät koppeln';
    error.style.color='var(--danger)';
    error.textContent=e.name==='AbortError'?'Die Kopplungsanfrage hat zu lange gedauert. Bitte erneut versuchen.':e.message;
  }
}
async function initPairing(){
  const hash=new URLSearchParams(location.hash.replace(/^#/,''));
  const pairedToken=hash.get('paired_token');
  if(pairedToken){
    sessionToken=pairedToken;
    try{localStorage.setItem(tokenKey,pairedToken)}catch(e){}
    history.replaceState({},'',location.pathname+location.search);
  }
  const query=new URLSearchParams(location.search);
  const code=query.get('pair');
  if(code){
    document.getElementById('pairing-code').value=code;
    history.replaceState({},'',location.pathname);
    showPairing();
  }
  try{
    const status=await requestJson('/api/pairing/status');
    if(status.pairing_required&&!status.authorized){authReady=false;showPairing();return false}
    authGeneration++;
    authReady=true;
    hidePairing();
    return true;
  }catch(e){
    showPairing();
    return false;
  }
}

async function runAction(action,payload={}){
  if(!confirm('Aktion in MediaHub ausführen?')) return;
  try{
    const r=await fetch('/api/action',{method:'POST',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify({action,payload})});
    const data=await r.json();
    alert(data.message||data.error||(data.ok?'Aktion wurde ausgeführt.':'Aktion fehlgeschlagen.'));
    if(data.ok){setTimeout(refreshCurrent,300)}
  }catch(error){alert('Aktion fehlgeschlagen: '+error.message)}
}
function empty(msg){return `<div class="card empty">${esc(msg)}</div>`}function rows(items,fn){return items?.length?`<div class="list">${items.map(fn).join('')}</div>`:empty('Keine Einträge vorhanden.')}
async function load(id){try{if(id==='dashboard')return dashboard();if(id==='assistant')return assistant();if(id==='channels')return channels();if(id==='playlists')return playlists();if(id==='library')return library();if(id==='downloads')return downloads();if(id==='jobs')return jobs();if(id==='scheduler')return scheduler();if(id==='statistics')return statistics();if(id==='plugins')return plugins();if(id==='system')return system();if(id==='activities')return activities()}catch(e){document.getElementById('page-'+id).innerHTML=empty(e.message)}}
function refreshCurrent(){if(!authReady)return;const id=document.querySelector('.page.active')?.id?.replace('page-','')||'dashboard';load(id)}
function actionBar(){return `<div class="actionbar"><button class="button primary" data-page="assistant">🧙 Assistent</button><button class="button" data-page="channels">📺 Kanäle</button><button class="button" data-page="downloads">⬇️ Downloads</button><button class="button" data-page="plugins">🧩 Plugins</button><button class="button" onclick="refreshCurrent()">↻ Aktualisieren</button></div>`}
async function dashboard(){const [s,d]=await Promise.all([api('/api/status'),api('/api/dashboard')]);const m=s.mediahub||{},x=d.data||{};connection.textContent=m.connected?'MediaHub verbunden':'Nicht verbunden';connection.className='badge '+(m.connected?'ok':'warn');document.getElementById('page-dashboard').innerHTML=actionBar()+`<div class="hero"><div><h2>Live-Dashboard</h2><div class="muted">Alle freigegebenen MediaHub-Daten auf einen Blick.</div></div><button class="button" onclick="dashboard()">↻</button></div><div class="grid">${[['Kanäle',x.channels??m.channels],['Playlists',x.playlists??m.playlists],['Videos',x.videos??m.videos],['Neue Videos',x.new_videos],['Geladen',x.downloaded_videos],['Downloads heute',x.downloads_today],['Aktive Jobs',x.active_jobs],['Scheduler',x.scheduler_status]].map(a=>`<div class="card"><div class="muted">${a[0]}</div><div class="number">${esc(a[1]??0)}</div></div>`).join('')}</div><div class="card"><strong>Systemzustand</strong><p>Health Check: ${esc(x.health_status||'–')} · Letzter Sync: ${esc(x.last_sync||'–')} · Datenbank: ${esc(x.db_size||'–')}</p></div>`}
let wizardState={step:0,data:{},options:{},playlists:[],selection:null,loading:false};
let wizardSelectionTimer=null;
async function post(path,payload){const d=await requestJson(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload||{})});if(d.ok===false)throw new Error(d.message||d.error||'Anfrage fehlgeschlagen');return d}
async function assistant(){try{const o=await api('/api/wizard/options');if(!o.available)throw new Error(o.message||'Assistent nicht verfügbar');wizardState.options=o.options||{};wizardState.data={...(o.options.defaults||{}),...wizardState.data};renderWizard()}catch(e){document.getElementById('page-assistant').innerHTML=empty(e.message)}}
function wizardSteps(){return ['Quelle','Ordner','Benennung','Playlists','Automatisierung','Zusammenfassung','Videoauswahl'].map((x,i)=>`<span class="wizard-step ${i===wizardState.step?'active':''}">${i+1}. ${x}</span>`).join('')}
function wval(k,d=''){return esc(wizardState.data[k]??d)}function wchecked(k,d=false){return (wizardState.data[k]??d)?'checked':''}
function collectWizard(){document.querySelectorAll('#wizard-form [name]').forEach(x=>{wizardState.data[x.name]=x.type==='checkbox'?x.checked:x.type==='number'?Number(x.value):x.value})}
function wizardSelect(name,items,current){return `<select name="${name}">${(items||[]).map(x=>`<option ${String(x)===String(current)?'selected':''}>${esc(x)}</option>`).join('')}</select>`}
function renderWizard(){const p=document.getElementById('page-assistant');let body='';const d=wizardState.data,o=wizardState.options;
if(wizardState.step===0)body=`<div class="wizard-grid"><label>YouTube-URL<input name="url" value="${wval('url')}" placeholder="https://youtube.com/@Kanal"></label><label>Kanalname<input name="name" value="${wval('name')}"></label><label>Profil${wizardSelect('profile',o.profiles,d.profile)}</label><label>Kanal-ID<input name="channel_id" value="${wval('channel_id')}" readonly></label></div><div class="card"><button class="button primary" type="button" onclick="wizardAnalyze()" ${wizardState.loading?'disabled':''}>YouTube-Daten erkennen</button><p class="muted">Name, Beschreibung, Bilder und Standardordner werden aus der URL vorbereitet.</p>${wizardState.loading?`<div class="loading-box"><span class="spinner"></span><div><strong>Kanal wird eingelesen …</strong><div class="muted">YouTube-Daten, Name und Bilder werden geladen. Das kann bei großen Kanälen etwas dauern.</div></div></div>`:''}</div>${d.name?`<div class="card channel-preview">${d.avatar?`<img src="${esc(d.avatar)}" alt="Kanalbild">`:''}<div><h3>${esc(d.name)}</h3><p>${esc(d.description||'Keine Beschreibung verfügbar.')}</p>${d.banner?`<img src="${esc(d.banner)}" alt="Banner" style="width:100%;height:100px">`:''}</div></div>`:''}`;
if(wizardState.step===1)body=`<div class="wizard-grid"><label>Arbeitsordner<input name="work_folder" value="${wval('work_folder')}"></label><label>Zielordner / Plex<input name="target_folder" value="${wval('target_folder')}"></label><label>Playlist-Ordner${wizardSelect('playlist_folder_mode',o.playlist_folder_modes,d.playlist_folder_mode)}</label><label>Beschreibung<textarea name="description" rows="5">${wval('description')}</textarea></label></div>`;
if(wizardState.step===2)body=`<div class="wizard-grid"><label>Dateinamenschema${wizardSelect('filename_template',o.filename_templates,d.filename_template)}</label><label>Container${wizardSelect('container',o.containers,d.container)}</label><label>Auflösung${wizardSelect('resolution',o.resolutions,d.resolution)}</label><label>Audioformat${wizardSelect('audio_format',o.audio_formats,d.audio_format)}</label><label class="check"><input type="checkbox" name="audio_only" ${wchecked('audio_only')}> Nur Audio</label><label class="check"><input type="checkbox" name="create_nfo" ${wchecked('create_nfo',true)}> NFO erzeugen</label><label class="check"><input type="checkbox" name="create_poster" ${wchecked('create_poster',true)}> Poster erzeugen</label><label class="check"><input type="checkbox" name="create_fanart" ${wchecked('create_fanart',true)}> Fanart erzeugen</label><label class="check"><input type="checkbox" name="clean_work_folder" ${wchecked('clean_work_folder',true)}> Arbeitsordner nach Import leeren</label><label>Poster/Avatar<input name="poster" value="${wval('poster',d.avatar||'')}"></label><label>Fanart/Banner<input name="fanart" value="${wval('fanart',d.banner||'')}"></label></div>`;
if(wizardState.step===3)body=`<div class="card"><button class="button primary" type="button" onclick="wizardLoadPlaylists()">Playlists laden</button><span class="muted"> ${wizardState.playlists.length} gefunden</span></div>${wizardState.playlists.length?`<div class="list">${wizardState.playlists.map((x,i)=>`<div class="row playlist-edit"><input type="checkbox" ${x.enabled?'checked':''} onchange="wizardState.playlists[${i}].enabled=this.checked"><strong>${esc(x.title)}</strong><input value="${esc(x.display_name)}" onchange="wizardState.playlists[${i}].display_name=this.value"><input type="number" min="1" value="${Number(x.season||i+1)}" onchange="wizardState.playlists[${i}].season=Number(this.value)"></div>`).join('')}</div>`:empty('Noch keine Playlists geladen.')}`;
if(wizardState.step===4)body=`<div class="wizard-grid"><label class="check"><input type="checkbox" name="create_job" ${wchecked('create_job',true)}> Sync-Job anlegen</label><label class="check"><input type="checkbox" name="create_scheduler" ${wchecked('create_scheduler')}> Scheduler-Aufgabe anlegen</label><label>Intervall in Stunden<input type="number" min="1" max="8760" name="interval_hours" value="${Number(d.interval_hours||24)}"></label><label class="check"><input type="checkbox" name="start_sync_now" ${wchecked('start_sync_now')}> Nach dem Speichern synchronisieren</label><label class="check"><input type="checkbox" name="start_download_after_sync" ${wchecked('start_download_after_sync')}> Danach neue Videos zur Download-Auswahl öffnen</label></div>`;
if(wizardState.step===5)body=`<div class="card"><h3>${wval('name','Neuer Kanal')}</h3><p>${wval('url')}</p><p><strong>Ordner:</strong> ${wval('work_folder')} → ${wval('target_folder')}</p><p><strong>Profil/Qualität:</strong> ${wval('profile')} · ${wval('resolution')} · ${wval('container')}</p><p><strong>Playlists:</strong> ${wizardState.playlists.filter(x=>x.enabled).length} aktiv</p><p><strong>Automatisierung:</strong> ${d.create_job?'Job ':''}${d.create_scheduler?'Scheduler ':''}${d.start_download_after_sync?'Sync + Downloadauswahl':d.start_sync_now?'Sofort-Sync':'kein Sofortstart'}</p></div>`;
if(wizardState.step===6)body=renderWizardSelection();
p.innerHTML=`<div class="hero"><div><h2>🧙 Start-/Download-Assistent</h2><div class="muted">Vollständig im Browser bedienbar. MediaHub führt Speichern und Start kontrolliert aus.</div></div><button class="button" onclick="runAction('setup_wizard.open')">Nativen Assistenten öffnen</button></div><div class="wizard-steps">${wizardSteps()}</div><form id="wizard-form" class="card" onsubmit="return false">${body}<div class="wizard-actions"><button class="button" type="button" onclick="wizardBack()" ${wizardState.step===0?'disabled':''}>Zurück</button>${wizardState.step<5?`<button class="button primary" type="button" onclick="wizardNext()">Weiter</button>`:wizardState.step===5?`<button class="button primary" type="button" onclick="wizardSubmit()">Speichern${d.start_sync_now||d.start_download_after_sync?' und starten':''}</button>`:''}</div></form>`}
async function wizardAnalyze(){collectWizard();wizardState.loading=true;renderWizard();try{const r=await post('/api/wizard/analyze',wizardState.data);wizardState.data={...wizardState.data,...r.data,poster:r.data.avatar||wizardState.data.poster,fanart:r.data.banner||wizardState.data.fanart};}catch(e){alert(e.message)}finally{wizardState.loading=false;renderWizard()}}
async function wizardLoadPlaylists(){collectWizard();try{const r=await post('/api/wizard/playlists',{url:wizardState.data.url,name:wizardState.data.name});wizardState.playlists=r.playlists||[];renderWizard()}catch(e){alert(e.message)}}
function wizardBack(){collectWizard();wizardState.step=Math.max(0,wizardState.step-1);renderWizard()}
function wizardNext(){collectWizard();if(wizardState.step===0&&!wizardState.data.url)return alert('Bitte zuerst eine YouTube-URL eingeben.');if(wizardState.step===0&&!wizardState.data.name)return alert('Bitte Kanalname eingeben oder Daten erkennen lassen.');wizardState.step=Math.min(6,wizardState.step+1);renderWizard()}
async function wizardSubmit(){collectWizard();const payload={...wizardState.data,playlist_settings:wizardState.playlists};if(!confirm('Kanal und gewählte Automatisierung in MediaHub speichern?'))return;try{wizardState.loading=true;renderWizard();const r=await post('/api/wizard/submit',payload);if(payload.start_download_after_sync){wizardState.step=6;wizardState.selection={status:'loading',message:'Kanal wird synchronisiert und die Downloadliste wird geladen …',videos:[]};renderWizard();startWizardSelectionPolling()}else{alert(r.message||'Assistent wurde an MediaHub übergeben.');wizardState={step:0,data:{},options:wizardState.options,playlists:[],selection:null,loading:false};setTimeout(()=>show('channels'),800)}}catch(e){wizardState.loading=false;alert(e.message);renderWizard()}}
function renderWizardSelection(){const s=wizardState.selection||{status:'loading',message:'Downloadliste wird vorbereitet …',videos:[]};if(['loading','idle'].includes(s.status))return `<div class="loading-box"><span class="spinner"></span><div><strong>${esc(s.message||'Downloadliste wird geladen …')}</strong><div class="muted">MediaHub synchronisiert den Kanal und lädt die echten Videodaten.</div></div></div>`;if(s.status==='error'||s.status==='empty')return empty(s.message||'Keine Videos gefunden.');if(s.status==='started')return `<div class="card"><h3>Download gestartet</h3><p>${esc(s.message)}</p><button class="button primary" type="button" data-page="downloads">Zu den Downloads</button></div>`;const videos=s.videos||[];return `<div class="video-tools"><input id="wizard-video-search" placeholder="Titel oder Playlist filtern …" oninput="filterWizardVideos()"><button class="button" type="button" onclick="setWizardVideos(true)">Alle</button><button class="button" type="button" onclick="setWizardVideos(false)">Keine</button><button class="button" type="button" onclick="selectOnlyNewWizardVideos()">Nur neue</button><button class="button primary" type="button" onclick="wizardDownloadSelected()">Download starten</button></div><div class="muted">${esc(s.message)} · <span id="wizard-selected-count"></span></div><div class="list" id="wizard-video-list">${videos.map((v,i)=>`<div class="row video-select" data-search="${esc((v.title+' '+v.playlist).toLowerCase())}"><input type="checkbox" class="wizard-video-check" data-id="${esc(v.video_id||v.id||i)}" ${v.checked&&!v.is_members_only?'checked':''} ${v.is_members_only?'disabled':''} onchange="updateWizardSelectedCount()"><span>${v.thumbnail?`<img src="${esc(v.thumbnail)}" alt="Vorschaubild">`:'🎬'}</span><strong>${v.is_members_only?'🔒 ':''}${esc(v.title)}</strong><span>${esc(v.playlist||'–')}</span><span>${esc(v.status||'Neu')}</span></div>`).join('')}</div>`}
function startWizardSelectionPolling(){clearInterval(wizardSelectionTimer);const poll=async()=>{try{const s=await api('/api/wizard/selection');wizardState.selection=s;wizardState.loading=false;renderWizard();if(!['loading','idle'].includes(s.status)){clearInterval(wizardSelectionTimer);setTimeout(updateWizardSelectedCount,0)}}catch(e){wizardState.selection={status:'error',message:e.message,videos:[]};renderWizard();clearInterval(wizardSelectionTimer)}};poll();wizardSelectionTimer=setInterval(poll,1500)}
function filterWizardVideos(){const q=(document.getElementById('wizard-video-search')?.value||'').toLowerCase();document.querySelectorAll('#wizard-video-list .video-select').forEach(x=>x.style.display=x.dataset.search.includes(q)?'grid':'none')}
function setWizardVideos(value){document.querySelectorAll('.wizard-video-check:not(:disabled)').forEach(x=>x.checked=value);updateWizardSelectedCount()}
function selectOnlyNewWizardVideos(){const videos=wizardState.selection?.videos||[];document.querySelectorAll('.wizard-video-check').forEach((x,i)=>{if(!x.disabled)x.checked=!!videos[i]?.is_new});updateWizardSelectedCount()}
function updateWizardSelectedCount(){const n=document.querySelectorAll('.wizard-video-check:checked').length;const e=document.getElementById('wizard-selected-count');if(e)e.textContent=n+' ausgewählt'}
async function wizardDownloadSelected(){const ids=[...document.querySelectorAll('.wizard-video-check:checked')].map(x=>x.dataset.id);if(!ids.length)return alert('Bitte mindestens ein Video auswählen.');if(!confirm(ids.length+' Video(s) herunterladen?'))return;try{const r=await post('/api/wizard/download',{video_ids:ids});wizardState.selection={...(wizardState.selection||{}),status:'started',message:r.message||'Download gestartet.'};renderWizard();setTimeout(()=>show('downloads'),700)}catch(e){alert(e.message)}}
async function channels(){const d=await api('/api/channels');document.getElementById('page-channels').innerHTML=`<div class="hero"><div><h2>Kanäle</h2><div class="muted">${d.count||0} gespeicherte Kanäle</div></div></div>${rows(d.channels,x=>`<div class="row"><strong>${esc(x.name)}</strong><span>${esc(x.playlist_count)} Playlists</span><span>${esc(x.video_count)} Videos</span><span><button class="button" onclick="runAction('channels.sync',{channel_index:Number(x.index)})">Synchronisieren</button></span></div>`)}`}
async function playlists(){const d=await api('/api/playlists');document.getElementById('page-playlists').innerHTML=`<div class="hero"><div><h2>Playlists</h2><div class="muted">${d.count||0} Sammlungen</div></div></div>${rows(d.playlists,x=>`<div class="row"><strong>${esc(x.display_name||x.title)}</strong><span>${esc(x.channel_name||'–')}</span><span>${esc(x.video_count||0)} Videos</span><span>${x.enabled?'Aktiv':'Inaktiv'}</span></div>`)}`}
async function library(){const d=await api('/api/library');document.getElementById('page-library').innerHTML=`<div class="hero"><div><h2>Bibliothek</h2><div class="muted">Die letzten ${d.count||0} Videoeinträge</div></div></div>${rows(d.videos,x=>`<div class="row"><strong>${esc(x.title)}</strong><span>${esc(x.channel_name||'–')}</span><span>${esc(x.upload_date||'–')}</span><span>${x.is_downloaded?'Geladen':x.is_new?'Neu':esc(x.status||'Bekannt')}</span></div>`)}`}
async function downloads(){const d=await api('/api/downloads');const q=d.queue||[];document.getElementById('page-downloads').innerHTML=`<div class="hero"><div><h2>Live-Downloads</h2><div class="muted">${esc(d.status||'')}</div></div><div><button class="button" onclick="runAction('downloads.select_videos')">Videoauswahl</button> <button class="button" onclick="runAction('downloads.select_playlists')">Playlists</button> <button class="button" onclick="runAction('downloads.cancel')">Abbrechen</button></div></div><div class="grid"><div class="card"><div class="muted">Aktiv</div><div class="number">${d.active?'Ja':'Nein'}</div></div><div class="card"><div class="muted">Aktuell</div><strong>${esc(d.current_title||'–')}</strong></div><div class="card"><div class="muted">Fortschritt</div><div class="number">${esc(d.total_progress||0)}%</div><div class="progress"><i style="width:${Number(d.total_progress||0)}%"></i></div></div><div class="card"><div class="muted">Erledigt</div><div class="number">${esc(d.done_count||0)}/${esc(d.total_count||0)}</div></div></div>${rows(q,x=>`<div class="row"><strong>${esc(x.title||x.name||'Video')}</strong><span>${esc(x.status||'wartet')}</span><span>${esc(x.progress||0)}%</span><span>${esc(x.channel||'')}</span></div>`)}`}
async function jobs(){const d=await api('/api/jobs');document.getElementById('page-jobs').innerHTML=`<div class="hero"><div><h2>Jobs</h2><div class="muted">${d.count||0} letzte Jobs</div></div><button class="button primary" onclick="runAction('jobs.run_next')">Nächsten Job starten</button></div>${rows(d.jobs,x=>`<div class="row"><strong>${esc(x.job_type||x.type||'Job')}</strong><span>${esc(x.channel_name||x.channel||'–')}</span><span>${esc(x.status||'–')}</span><span>${esc(x.created_at||'')}</span></div>`)}`}
async function scheduler(){const d=await api('/api/scheduler');document.getElementById('page-scheduler').innerHTML=`<div class="hero"><div><h2>Scheduler</h2><div class="muted">${d.count||0} Aufgaben</div></div><div><button class="button" onclick="runAction('scheduler.check')">Jetzt prüfen</button> <button class="button" onclick="runAction('scheduler.toggle')">Automatik umschalten</button></div></div>${rows(d.tasks,x=>`<div class="row"><strong>${esc(x.name||x.task_type||'Aufgabe')}</strong><span>${esc(x.channel_name||x.channel||'–')}</span><span>${x.enabled?'Aktiv':'Inaktiv'}</span><span>${esc(x.next_run_at||'–')}</span></div>`)}`}
async function statistics(){const d=await api('/api/statistics'),s=d.statistics||{};const flat=[];for(const [k,v] of Object.entries(s)){if(v===null||typeof v!=='object')flat.push([k,v])}document.getElementById('page-statistics').innerHTML=`<div class="hero"><div><h2>Statistik</h2><div class="muted">Ausführliche MediaHub-Zahlen</div></div></div><div class="grid">${flat.slice(0,20).map(a=>`<div class="card"><div class="muted">${esc(a[0].replaceAll('_',' '))}</div><div class="number">${esc(a[1]??'–')}</div></div>`).join('')}</div>`}
async function plugins(){const d=await api('/api/plugins');document.getElementById('page-plugins').innerHTML=`<div class="hero"><div><h2>Installierte Plugins</h2><div class="muted">${d.count||0} erkannte Erweiterungen</div></div><button class="button primary" onclick="runAction('plugins.open')">Plugin-Center öffnen</button></div>${rows(d.plugins,x=>`<div class="row"><strong>${esc(x.name)}</strong><span>v${esc(x.version||'–')}</span><span>${x.enabled?'Aktiviert':'Deaktiviert'}</span><span class="${x.running?'ok':'off'}">${x.running?'Läuft':'Installiert'}</span></div>`)}`}
async function system(){const d=await api('/api/system'),s=d.system||{};document.getElementById('page-system').innerHTML=`<div class="hero"><div><h2>Systemübersicht</h2><div class="muted">Keine geheimen Pfade oder Zugangsdaten</div></div></div><div class="card"><div class="list">${Object.entries(s).map(([k,v])=>`<div class="row"><strong>${esc(k.replaceAll('_',' '))}</strong><span>${esc(typeof v==='object'?JSON.stringify(v):v)}</span><span></span><span></span></div>`).join('')}</div></div>`}
function activityRow(x){return `<div class="row"><strong>${esc(x.title)}</strong><span>${esc(x.category)}</span><span>${esc(x.detail)}</span><span>${new Date(x.time).toLocaleTimeString('de-DE')}</span></div>`}async function activities(){const d=await api('/api/activities');document.getElementById('page-activities').innerHTML=`<div class="hero"><div><h2>Aktivitäten</h2><div class="muted">Seit dem WebRemote-Start</div></div></div>${rows(d.activities,activityRow)}`}
initPairing().then(ok=>{if(ok)show('dashboard')});setInterval(()=>{if(!authReady||pairingCompleting)return;const id=document.querySelector('.page.active')?.id?.replace('page-','');if(['dashboard','downloads','activities'].includes(id))load(id)},1000);
</script></body></html>
