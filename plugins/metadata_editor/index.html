<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MediaHub Metadata Editor</title>
  <link rel="stylesheet" href="/metadata-editor/assets/mediahub.css">
  <style>
    :root{color-scheme:dark;--bg:#10131a;--panel:#191e28;--panel2:#222936;--text:#f3f5f7;--muted:#aeb7c5;--line:#343d4d;--accent:#48a7ff;--good:#4fd18b;--warn:#ffca5c;--bad:#ff6f79}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 system-ui,Segoe UI,sans-serif}.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.sidebar{border-right:1px solid var(--line);padding:22px;background:#141923}.brand{font-size:21px;font-weight:750;margin-bottom:6px}.version,.muted{color:var(--muted)}input,textarea,select,button{font:inherit}.search,input,textarea{width:100%;background:#0f141c;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px}.search{margin:20px 0 12px}.media-list{display:grid;gap:7px;max-height:calc(100vh - 155px);overflow:auto}.media-item{padding:10px;border:1px solid transparent;border-radius:9px;background:transparent;color:var(--text);text-align:left;cursor:pointer}.media-item:hover,.media-item.active{background:var(--panel2);border-color:var(--line)}.media-title{font-weight:650}.media-sub{font-size:12px;color:var(--muted)}main{padding:26px;overflow:auto}.topbar{display:flex;justify-content:space-between;gap:15px;align-items:flex-start;margin-bottom:20px}.status{padding:8px 12px;border-radius:999px;background:var(--panel2);color:var(--muted)}.status.good{color:var(--good)}.editor{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:20px}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.wide{grid-column:1/-1}label{display:grid;gap:6px;font-weight:600}textarea{min-height:150px;resize:vertical}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}button{border:0;border-radius:9px;padding:10px 14px;cursor:pointer;background:var(--panel2);color:var(--text)}button.primary{background:var(--accent);color:#08121d;font-weight:750}button:disabled{opacity:.45;cursor:not-allowed}.changes{display:grid;gap:10px}.change{border:1px solid var(--line);border-radius:9px;padding:10px}.change b{display:block}.before{color:var(--bad);text-decoration:line-through}.after{color:var(--good)}.empty{padding:35px;text-align:center;color:var(--muted)}@media(max-width:950px){.app{grid-template-columns:1fr}.sidebar{border-right:0;border-bottom:1px solid var(--line)}.media-list{max-height:260px}.editor{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr 1fr}}@media(max-width:600px){main{padding:16px}.form-grid{grid-template-columns:1fr}.topbar{display:block}.status{display:inline-block;margin-top:10px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">Metadata Editor</div>
    <div class="version">MediaHub Plugin v0.1.0</div>
    <input id="search" class="search" placeholder="Bibliothek durchsuchen…">
    <div id="mediaList" class="media-list"><div class="empty">Bibliothek wird geladen…</div></div>
  </aside>
  <main>
    <div class="topbar"><div><h1 id="heading">Metadaten bearbeiten</h1><div class="muted">Sicherer Vergleich und lokale Entwürfe vor dem Überschreiben.</div></div><div id="status" class="status">Verbindung wird geprüft…</div></div>
    <div id="empty" class="card empty">Wähle links einen Medieneintrag aus.</div>
    <div id="editor" class="editor" hidden>
      <section class="card">
        <div class="form-grid">
          <label class="wide">Titel<input data-field="title"></label>
          <label class="wide">Beschreibung<textarea data-field="description"></textarea></label>
          <label>Jahr<input data-field="year" inputmode="numeric"></label>
          <label>Staffel<input data-field="season" inputmode="numeric"></label>
          <label>Episode<input data-field="episode" inputmode="numeric"></label>
          <label>Serie<input data-field="series"></label>
          <label>Kanal<input data-field="channel"></label>
          <label>Playlist<input data-field="playlist"></label>
          <label>Veröffentlichung<input data-field="published_at" type="date"></label>
          <label class="wide">Datei / Pfad<input id="path" readonly></label>
        </div>
        <div class="actions"><button id="preview">Änderungen prüfen</button><button id="draft" class="primary">Entwurf speichern</button><button id="commit">Endgültig speichern</button></div>
        <p id="message" class="muted"></p>
      </section>
      <aside class="card"><h2>Vergleich</h2><div id="changes" class="changes"><div class="empty">Noch keine Änderungen.</div></div></aside>
    </div>
  </main>
</div>
<script>
const state={items:[],selected:null,write:false};
const fields=[...document.querySelectorAll('[data-field]')];
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(url,options){const r=await fetch(url,options);let d={};try{d=await r.json()}catch{}if(!r.ok&&!d.message)d.message='Anfrage fehlgeschlagen.';return d}
function original(){return {...state.selected}}
function edited(){const x=original();fields.forEach(f=>x[f.dataset.field]=f.value);return x}
function payload(){return {id:state.selected?.id,original:original(),edited:edited()}}
function renderList(){const q=$('search').value.trim().toLowerCase();const list=state.items.filter(x=>[x.title,x.series,x.channel,x.playlist].join(' ').toLowerCase().includes(q));$('mediaList').innerHTML=list.length?list.map(x=>`<button class="media-item ${state.selected?.id===x.id?'active':''}" data-id="${esc(x.id)}"><div class="media-title">${esc(x.title||'Ohne Titel')}</div><div class="media-sub">${esc(x.series||x.channel||x.playlist||x.path||'')}</div></button>`).join(''):'<div class="empty">Keine Einträge gefunden.</div>';document.querySelectorAll('.media-item').forEach(b=>b.onclick=()=>select(b.dataset.id))}
function select(id){state.selected=state.items.find(x=>String(x.id)===String(id));if(!state.selected)return;fields.forEach(f=>f.value=state.selected[f.dataset.field]??'');$('path').value=state.selected.path||state.selected.file_path||state.selected.filename||'';$('heading').textContent=state.selected.title||'Metadaten bearbeiten';$('empty').hidden=true;$('editor').hidden=false;$('message').textContent='';renderChanges({});renderList()}
function renderChanges(changes){const entries=Object.entries(changes||{});$('changes').innerHTML=entries.length?entries.map(([k,v])=>`<div class="change"><b>${esc(k)}</b><div class="before">Alt: ${esc(v.before)}</div><div class="after">Neu: ${esc(v.after)}</div></div>`).join(''):'<div class="empty">Noch keine Änderungen.</div>'}
async function preview(){if(!state.selected)return;const d=await api('/metadata-editor/api/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});renderChanges(d.changes);$('message').textContent=d.change_count?`${d.change_count} Änderung(en) erkannt.`:'Keine Änderungen erkannt.';return d}
$('preview').onclick=preview;$('draft').onclick=async()=>{if(!state.selected)return;const d=await api('/metadata-editor/api/draft',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});$('message').textContent=d.message||'';renderChanges(d.draft?.changes||{})};$('commit').onclick=async()=>{if(!state.selected)return;const d=await api('/metadata-editor/api/commit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});$('message').textContent=d.message||'';if(d.ok){Object.assign(state.selected,edited());renderList()}};$('search').oninput=renderList;
(async()=>{const s=await api('/metadata-editor/api/status');state.write=!!s.write_api_available;$('status').textContent=s.message;$('status').classList.toggle('good',state.write);$('commit').disabled=!state.write;const l=await api('/metadata-editor/api/library');state.items=l.items||[];renderList();if(!l.available)$('mediaList').innerHTML=`<div class="empty">${esc(l.message||'Bibliothek nicht verfügbar.')}</div>`})();
</script>
</body>
</html>
