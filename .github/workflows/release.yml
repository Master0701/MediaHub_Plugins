name: Plugin Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python validate_plugins.py
      - run: python build_plugins.py --clean
      - name: Quellpaket erstellen
        shell: pwsh
        run: |
          $name = "MediaHub_Plugins_Source_${{ github.ref_name }}.zip"
          git archive --format=zip --output="release/$name" HEAD
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.mhplugin
            release/*.sha256
            release/MediaHub_Plugins_Source_*.zip
