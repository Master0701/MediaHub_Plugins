name: Plugin Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Plugins prüfen
        run: python validate_plugins.py

      - name: Alle Plugins sauber bauen
        run: python build_plugins.py all --clean

      - name: Quellpaket erstellen
        shell: pwsh
        run: |
          $name = "MediaHub_Plugins_Source_${{ github.ref_name }}.zip"
          git archive --format=zip --output="release/$name" HEAD

      - name: Release-Dateien als Workflow-Artefakt hochladen
        uses: actions/upload-artifact@v6
        with:
          name: MediaHub-Plugins-${{ github.ref_name }}
          path: |
            release/*.mhplugin
            release/*.sha256
            release/MediaHub_Plugins_Source_*.zip
            RELEASE_NOTES.md
          if-no-files-found: error

      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v3
        with:
          name: MediaHub Plugins ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            release/*.mhplugin
            release/*.sha256
            release/MediaHub_Plugins_Source_*.zip

      - name: Release-Beschreibung sicher aktualisieren
        uses: actions/github-script@v8
        env:
          RELEASE_NOTES_PATH: RELEASE_NOTES.md
        with:
          script: |
            const fs = require("fs");
            const tag = context.ref.replace("refs/tags/", "");
            const body = fs.readFileSync(
              process.env.RELEASE_NOTES_PATH,
              "utf8"
            );

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: `MediaHub Plugins ${tag}`,
              body,
              draft: false,
              prerelease:
                tag.includes("test") ||
                tag.includes("beta") ||
                tag.includes("alpha"),
            });

            core.info("Plugin-Release-Beschreibung aktualisiert.");
