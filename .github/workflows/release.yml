name: Plugin Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Plugins prüfen
        run: python validate_plugins.py

      - name: Alle Plugins sauber bauen
        run: python build_plugins.py all --clean

      - name: Quellpaket erstellen
        shell: pwsh
        run: |
          $name = "MediaHub_Plugins_Source_${{ github.ref_name }}.zip"
          git archive --format=zip --output="release/$name" HEAD

      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.mhplugin
            release/*.sha256
            release/MediaHub_Plugins_Source_*.zip
          fail_on_unmatched_files: true
