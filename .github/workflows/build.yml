name: Plugin Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Plugins prüfen
        run: python validate_plugins.py

      - name: Alle Plugins sauber bauen
        run: python build_plugins.py all --clean

      - name: Build-Dateien hochladen
        uses: actions/upload-artifact@v6
        with:
          name: MediaHub-Plugins
          path: |
            release/*.mhplugin
            release/*.sha256
          if-no-files-found: error
